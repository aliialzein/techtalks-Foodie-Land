name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
    steps:
      # Checkout the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js environment with a stable LTS release.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # Install backend dependencies exactly as locked in package-lock.json.
      - name: Install backend dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        env:
            PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: "1"



      # Execute the backend test suite.
      - name: Run backend tests
        run: npm run test

      # Build the Next.js backend application.
      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      # Checkout the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js environment with a stable LTS release.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies exactly as locked in package-lock.json.
      - name: Install frontend dependencies
        run: npm ci

      # Build the frontend application.
      - name: Build frontend
        run: npm run build